name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck-and-build:
    name: Typecheck and build
    runs-on: ubuntu-latest
    # pull-requests: write lets the preview-link step edit the PR body. Safe on
    # pull_request (never pull_request_target): a fork PR gets a read-only token
    # regardless, so a fork cannot use this to write to the repo.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # Uploaded only after a green typecheck and build. Firebot loads a single
      # .js, but upload-artifact always zips, so testers download the zip and
      # unpack the one file inside it.
      - name: Upload preview build
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: firebot-meld-studio-${{ github.event_name == 'pull_request' && format('pr{0}', github.event.pull_request.number) || github.ref_name }}-${{ github.sha }}
          path: dist/firebot-meld-studio.js
          retention-days: 14
          if-no-files-found: error

      # Rewrites the <!-- artifact --> region of the PR body so it always points
      # at the newest green build. Skipped for forks, whose read-only token
      # cannot update a PR (see the permissions note on this job).
      - name: Link the preview build in the PR body
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        with:
          script: |
            const START = '<!-- artifact -->';
            const END = '<!-- /artifact -->';
            const pr = context.payload.pull_request;

            const runUrl =
              `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const url = process.env.ARTIFACT_URL || runUrl;
            const sha = pr.head.sha.slice(0, 7);

            const block = [
              START,
              '### Preview build',
              '',
              `**[Download the built plugin](${url})**, from \`${sha}\`, kept for 14 days.`,
              '',
              'It arrives zipped (a GitHub Actions constraint, even for one file). Unzip it, then',
              'load `firebot-meld-studio.js` in Firebot via **Settings → Scripts**. Requires a GitHub login.',
              END,
            ].join('\n');

            const escape = (s) => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const region = new RegExp(`${escape(START)}[\\s\\S]*?${escape(END)}`);
            const body = pr.body ?? '';
            // Function replacer, not a string: `$&` / `$1` in the replacement
            // would otherwise be treated as capture references.
            const next = region.test(body)
              ? body.replace(region, () => block)
              : `${body.trimEnd()}\n\n${block}\n`;

            if (next === body) {
              core.info('PR body already up to date; nothing to write.');
              return;
            }
            await github.rest.pulls.update({
              ...context.repo,
              pull_number: pr.number,
              body: next,
            });
            core.info(`Linked preview build: ${url}`);
